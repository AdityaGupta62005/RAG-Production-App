version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: rag_backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./uploads:/app/uploads

    extra_hosts:
      - "host.docker.internal:host-gateway"

    depends_on:
      - qdrant

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile

    container_name: rag_frontend

    ports:
      - "8501:8501"

    env_file:
      - .env

    volumes:
      - ./uploads:/app/uploads

    extra_hosts:
      - "host.docker.internal:host-gateway"

    depends_on:
      - backend

  qdrant:
    image: qdrant/qdrant:latest

    container_name: qdrant_db

    ports:
      - "6333:6333"

    volumes:
      - ./qdrant_storage:/qdrant/storage